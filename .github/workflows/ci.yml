name: Hospital Registration CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build test image
        run: docker build --target test -t hospital-registration-test:test .

      - name: Run tests in Docker
        env:
          TEST_SCOPE: ${{ github.event_name == 'pull_request' && 'smoke' || 'full' }}
        run: |
          mkdir -p ci_artifacts
          docker run --rm \
            -e TEST_SCOPE="$TEST_SCOPE" \
            -e ARTIFACT_DIR=/artifacts \
            -v "${{ github.workspace }}/ci_artifacts:/artifacts" \
            hospital-registration-test:test

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hospital-registration-artifacts
          path: ci_artifacts
          if-no-files-found: ignore

  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/stevenliu-pc/hospital_registration_test
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}